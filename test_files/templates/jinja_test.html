<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
</head>
<body>
    <h1>{{ title }}</h1>
    
    <ul>
        {% for product in products %}
            <li>{{ product.name }} - ${{ product.price }}</li>
        {% endfor %}
    </ul>
    
    {% if user %}
        <p>Welcome, {{ user.name }}!</p>
    {% else %}
        <p>Please login</p>
    {% endif %}
    
    <p>Total: {{ product_count }}</p>
</body>
</html>
